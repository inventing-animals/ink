  namespace: Ink.Data.Queries
  summary: >-
    A leaf condition comparing a column field against one or more values.

    <p>

    <code class="paramref">Values</code> interpretation by operator:

    <ul><li><xref href="Ink.Data.Queries.FilterOp.IsNull" data-throw-if-not-resolved="false"></xref> / <xref href="Ink.Data.Queries.FilterOp.IsNotNull" data-throw-if-not-resolved="false"></xref> - empty list.</li><li>Most operators - single value at index 0.</li><li><xref href="Ink.Data.Queries.FilterOp.Between" data-throw-if-not-resolved="false"></xref> - two values: min at index 0, max at index 1.</li><li><xref href="Ink.Data.Queries.FilterOp.In" data-throw-if-not-resolved="false"></xref> / <xref href="Ink.Data.Queries.FilterOp.NotIn" data-throw-if-not-resolved="false"></xref> - one or more values.</li></ul>

    </p>

    <p>

    <code class="paramref">Field</code> is matched case-insensitively against registered columns.

    </p>
