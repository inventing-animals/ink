  - Ink.Data.EFCore
  namespace: Ink.Data.EFCore
  summary: >-
    Registers a handler for a custom (or overridden built-in) filter operator.

    Custom handlers take precedence over built-in operator handling.
  example:
  - >-
    <pre><code class="lang-csharp">translator.HandleOp(new FilterOp("fts"), (member, _, values) =&gt;
        Expression.Call(
            typeof(NpgsqlDbFunctionsExtensions),
            nameof(NpgsqlDbFunctionsExtensions.ToTsVector), ...));</code></pre>
  syntax:
    content: public EFCoreQueryTranslator<T> HandleOp(FilterOp op, Func<Expression, Type, IReadOnlyList<object?>, Expression> handler)
    parameters:
    - id: op
      type: Ink.Data.Queries.FilterOp
      description: The operator to handle.
    - id: handler
      type: System.Func{System.Linq.Expressions.Expression,System.Type,System.Collections.Generic.IReadOnlyList{System.Object},System.Linq.Expressions.Expression}
      description: >-
        A factory that receives the member access expression, the member's CLR type,

        and the condition values, and returns an EF Core-compatible predicate expression.
    return:
      type: Ink.Data.EFCore.EFCoreQueryTranslator`1
      description: The same translator for fluent chaining.
