  assemblies:
  - Ink.Data.EFCore
  namespace: Ink.Data.EFCore
  summary: >-
    Translates a <xref href="Ink.Data.Queries.DataGridQuery" data-throw-if-not-resolved="false"></xref> into EF Core <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref> operations,

    fully automatically handling filtering, sorting, and pagination.
  example:
  - >-
    <pre><code class="lang-csharp">// Configure once (e.g. as a singleton or static field)

    var translator = new EFCoreQueryTranslator&lt;User&gt;()
        .Column(x =&gt; x.Name)
        .Column(x =&gt; x.Email)
        .Column(x =&gt; x.CreatedAt)
        .Column(x =&gt; x.Status);

    // In an API endpoint

    app.MapPost("/api/users/query", (DataGridQuery query, AppDbContext db) =&gt;
        translator.ExecuteAsync(db.Users.Where(x =&gt; x.TenantId == tenantId), query));</code></pre>
