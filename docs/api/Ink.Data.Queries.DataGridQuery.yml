  assemblies:
  - Ink.Data
  namespace: Ink.Data.Queries
  summary: >-
    Describes a complete data grid query including visible columns, sort, filter, and pagination.

    This record is the single contract between the client grid and any data source or API endpoint.
  example: []
  syntax:
    content: public DataGridQuery(IReadOnlyList<string>? Columns, IReadOnlyList<SortDescriptor> Sort, FilterNode? Filter, int Page, int PageSize)
    parameters:
    - id: Columns
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: >-
        The field names of columns the client wants to receive, or <code>null</code> to request all registered columns.

        Sources and translators use this list for projection and security validation -

        fields not in the registered column set are rejected regardless of this value.
    - id: Sort
      type: System.Collections.Generic.IReadOnlyList{Ink.Data.Queries.SortDescriptor}
      description: Ordered list of sort criteria. Earlier entries take precedence.
    - id: Filter
      type: Ink.Data.Queries.FilterNode
      description: The root filter node, or <code>null</code> for no filtering.
    - id: Page
      type: System.Int32
      description: One-based page number.
    - id: PageSize
      type: System.Int32
      description: Number of items per page.
    content.vb: Public Sub New(Columns As IReadOnlyList(Of String), Sort As IReadOnlyList(Of SortDescriptor), Filter As FilterNode, Page As Integer, PageSize As Integer)
