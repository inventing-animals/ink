  summary: >-
    Returns a human-readable indented string representation of the filter tree,

    suitable for logging and debugging.
  example:
  - >-
    <pre><code class="lang-csharp">AND [
      name contains "john"
      OR [
        status in ["Active", "Pending"]
        age gt "18"
      ]
    ]</code></pre>
