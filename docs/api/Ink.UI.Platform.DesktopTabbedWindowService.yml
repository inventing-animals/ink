  namespace: Ink.UI.Platform
  summary: >-
    Desktop implementation that combines window and tab support.

    <ul><li><xref href="Ink.UI.Platform.DesktopTabbedWindowService.OpenAsync(System.Func%7bAvalonia.Controls.Control%7d%2cInk.UI.Platform.WindowOptions)" data-throw-if-not-resolved="false"></xref> - spawns a new OS window, identical to <xref href="Ink.UI.Platform.DesktopWindowService" data-throw-if-not-resolved="false"></xref>.</li><li><xref href="Ink.UI.Platform.DesktopTabbedWindowService.OpenTabAsync(System.Func%7bAvalonia.Controls.Control%7d%2cInk.UI.Platform.WindowOptions)" data-throw-if-not-resolved="false"></xref> - opens content as a tab inside the provided <xref href="Ink.UI.Controls.DesktopTabbedWindow" data-throw-if-not-resolved="false"></xref>.</li></ul>

    Pair this service with a <xref href="Ink.UI.Controls.DesktopTabbedWindow" data-throw-if-not-resolved="false"></xref> that the application owns

    and shows as its main window. The window's lifecycle is managed by the caller.
