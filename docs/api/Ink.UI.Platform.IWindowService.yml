      repo: https://github.com/inventing-animals/ink.git
    id: IWindowService
    path: ../src/Ink.UI/Platform/IWindowService.cs
    startLine: 19
  assemblies:
  - Ink.UI
  namespace: Ink.UI.Platform
  summary: >-
    Spawns secondary UI surfaces in a platform-appropriate way.

    <ul><li>Desktop - new <xref href="Ink.UI.Controls.DesktopWindow" data-throw-if-not-resolved="false"></xref></li><li>Desktop (tabbed) - tab inside the existing <xref href="Ink.UI.Controls.DesktopTabbedWindow" data-throw-if-not-resolved="false"></xref></li><li>Mobile  - bottom-sheet drawer via <code>OverlayLayer</code></li><li>Web     - new browser tab loaded at <xref href="Ink.UI.Platform.WindowOptions.Url" data-throw-if-not-resolved="false"></xref></li></ul>

    Surfaces are always <b>non-modal</b>: the caller is never blocked, and the app

    remains fully interactive while a secondary surface is open. This is a deliberate

    constraint driven by the web platform, where true modal behaviour across tabs is

    not possible.
  example: []
  syntax:
    content: public interface IWindowService
    content.vb: Public Interface IWindowService
