  summary: Opens content in a new window (or the platform equivalent).
  example: []
  syntax:
    content: Task<IWindowHandle> OpenAsync(Func<Control> content, WindowOptions? options = null)
    parameters:
    - id: content
      type: System.Func{Avalonia.Controls.Control}
      description: Factory that builds the content control (desktop and mobile only).
    - id: options
      type: Ink.UI.Platform.WindowOptions
      description: Optional title, size hints, and URL for the web platform.
    return:
      type: System.Threading.Tasks.Task{Ink.UI.Platform.IWindowHandle}
      description: A handle that lets the caller close the surface or await its dismissal.
    content.vb: Function OpenAsync(content As Func(Of Control), options As WindowOptions = Nothing) As Task(Of IWindowHandle)
