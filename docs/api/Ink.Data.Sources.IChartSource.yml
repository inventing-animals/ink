  namespace: Ink.Data.Sources
  summary: >-
    Provides aggregated time-series data for charts.

    The source is responsible for bucketing raw data according to

    the requested <xref href="Ink.Data.Queries.ChartQuery.Granularity" data-throw-if-not-resolved="false"></xref> and <xref href="Ink.Data.Queries.ChartQuery.Filter" data-throw-if-not-resolved="false"></xref>.
