  summary: >-
    Thrown when a <xref href="Ink.Data.Queries.DataGridQuery" data-throw-if-not-resolved="false"></xref> references a field that is not

    registered in the <xref href="Ink.Data.EFCore.EFCoreQueryTranslator%601" data-throw-if-not-resolved="false"></xref>.

    This acts as a security boundary - unregistered fields cannot be filtered, sorted,

    or projected regardless of what the client sends.
