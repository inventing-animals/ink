name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Ink.UI/Ink.UI.csproj

      - name: Build
        run: dotnet build src/Ink.UI/Ink.UI.csproj --no-restore -c Release

      - name: Test
        run: |
          TEST_PROJECTS=$(find . -name "*.Tests.csproj" -not -path "*/bin/*" -not -path "*/obj/*")
          if [ -n "$TEST_PROJECTS" ]; then
            echo "$TEST_PROJECTS" | xargs dotnet test -c Release
          else
            echo "No test projects found, skipping tests."
          fi

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Ink.UI/Ink.UI.csproj

      - name: Build
        run: dotnet build src/Ink.UI/Ink.UI.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack src/Ink.UI/Ink.UI.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  deploy-wasm-demo:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM demo
        run: dotnet publish src/Ink.Demo.Browser/Ink.Demo.Browser.csproj -c Release -o ./wasm-out

      - name: Add .nojekyll
        run: touch ./wasm-out/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./wasm-out/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
