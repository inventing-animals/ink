name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: |
          dotnet restore src/Ink.Localization/Ink.Localization.csproj
          dotnet restore src/Ink.Platform/Ink.Platform.csproj
          dotnet restore src/Ink.Platform.Browser/Ink.Platform.Browser.csproj
          dotnet restore src/Ink.FontAwesome/Ink.FontAwesome.csproj
          dotnet restore src/Ink.UI/Ink.UI.csproj
          dotnet restore src/Ink.Data/Ink.Data.csproj
          dotnet restore src/Ink.Data.EFCore/Ink.Data.EFCore.csproj
          dotnet restore src/Ink.DataGrid/Ink.DataGrid.csproj

      - name: Build
        run: |
          dotnet build src/Ink.Localization/Ink.Localization.csproj --no-restore -c Release
          dotnet build src/Ink.Platform/Ink.Platform.csproj --no-restore -c Release
          dotnet build src/Ink.Platform.Browser/Ink.Platform.Browser.csproj --no-restore -c Release
          dotnet build src/Ink.FontAwesome/Ink.FontAwesome.csproj --no-restore -c Release
          dotnet build src/Ink.UI/Ink.UI.csproj --no-restore -c Release
          dotnet build src/Ink.Data/Ink.Data.csproj --no-restore -c Release
          dotnet build src/Ink.Data.EFCore/Ink.Data.EFCore.csproj --no-restore -c Release
          dotnet build src/Ink.DataGrid/Ink.DataGrid.csproj --no-restore -c Release

      - name: Test
        run: |
          dotnet run -c Release --project tests/Ink.Data.Tests/Ink.Data.Tests.csproj
          dotnet run -c Release --project tests/Ink.Data.EFCore.Tests/Ink.Data.EFCore.Tests.csproj

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: |
          dotnet restore src/Ink.Localization/Ink.Localization.csproj
          dotnet restore src/Ink.Platform/Ink.Platform.csproj
          dotnet restore src/Ink.Platform.Browser/Ink.Platform.Browser.csproj
          dotnet restore src/Ink.FontAwesome/Ink.FontAwesome.csproj
          dotnet restore src/Ink.UI/Ink.UI.csproj
          dotnet restore src/Ink.Data/Ink.Data.csproj
          dotnet restore src/Ink.Data.EFCore/Ink.Data.EFCore.csproj
          dotnet restore src/Ink.DataGrid/Ink.DataGrid.csproj

      - name: Build
        run: |
          dotnet build src/Ink.Localization/Ink.Localization.csproj --no-restore -c Release
          dotnet build src/Ink.Platform/Ink.Platform.csproj --no-restore -c Release
          dotnet build src/Ink.Platform.Browser/Ink.Platform.Browser.csproj --no-restore -c Release
          dotnet build src/Ink.FontAwesome/Ink.FontAwesome.csproj --no-restore -c Release
          dotnet build src/Ink.UI/Ink.UI.csproj --no-restore -c Release
          dotnet build src/Ink.Data/Ink.Data.csproj --no-restore -c Release
          dotnet build src/Ink.Data.EFCore/Ink.Data.EFCore.csproj --no-restore -c Release
          dotnet build src/Ink.DataGrid/Ink.DataGrid.csproj --no-restore -c Release

      - name: Pack
        run: |
          dotnet pack src/Ink.Localization/Ink.Localization.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.Platform/Ink.Platform.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.Platform.Browser/Ink.Platform.Browser.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.FontAwesome/Ink.FontAwesome.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.UI/Ink.UI.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.Data/Ink.Data.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.Data.EFCore/Ink.Data.EFCore.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/Ink.DataGrid/Ink.DataGrid.csproj --no-build -c Release -o ./artifacts -p:Version=${GITHUB_REF_NAME#v}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  deploy-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build docs site
        run: docfx docs/docfx.json

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM demo
        run: dotnet publish src/Ink.Demo.Browser/Ink.Demo.Browser.csproj -c Release -o ./wasm-out -p:BaseHref=/ink/demo/

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p ./docs/_site/demo
          cp -r ./wasm-out/wwwroot/. ./docs/_site/demo/
          cp ./docs/404.html ./docs/_site/404.html
          touch ./docs/_site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
