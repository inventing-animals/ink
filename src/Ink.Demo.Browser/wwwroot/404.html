<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1e1e1e; color: #ccc; flex-direction: column; gap: 1rem; }
        a { color: #7ec8e3; }
        #status { font-size: 0.85rem; color: #888; }
        #error { display: none; color: #e07070; }
    </style>
</head>
<body>
    <p>Redirecting to app root&hellip;</p>
    <p id="status"></p>
    <p id="error">
        Redirect failed. <a id="fallback-link" href="/">Go to app root</a>.
    </p>
    <script>
        const status = document.getElementById('status');
        const error = document.getElementById('error');
        const fallbackLink = document.getElementById('fallback-link');

        try {
            const root = window.location.origin + '/';
            status.textContent = 'Target: ' + root;
            fallbackLink.href = root;
            window.location.replace(root);
        } catch (e) {
            status.textContent = 'Error: ' + e.message;
            error.style.display = '';
            console.error('[404] Redirect failed:', e);
        }
    </script>
</body>
</html>
